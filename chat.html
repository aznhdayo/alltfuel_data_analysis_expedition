<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Evasta Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    #chat-container {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #messages {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      background: #fafafa;
    }

    .msg {
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .user {
      font-weight: bold;
      color: #0078ff;
    }

    .bot {
      font-weight: bold;
      color: #333;
    }

    #input-area {
      display: flex;
      border-top: 1px solid #ccc;
      background: white;
    }

    #input-area input {
      flex: 1;
      padding: 12px;
      border: none;
      font-size: 16px;
      outline: none;
    }

    #input-area button {
      padding: 12px 20px;
      background: #0078ff;
      color: white;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    #input-area button:hover {
      background: #005fcc;
    }

	/* Chat layout */
#messages {
  max-height: 70vh;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  background: #0b1220;   /* change if you want */
  border-radius: 12px;
}

/* Message row */
.msg {
  padding: 10px 12px;
  border-radius: 12px;
  line-height: 1.35;
  font-size: 14px;
  color: #e6edf7;
}

/* Prefix styling */
.user, .bot {
  font-weight: 700;
  margin-right: 6px;
}

/* User bubble */
.msg .user {
  color: #7dd3fc; /* light blue */
}

/* Bot bubble */
.msg .bot {
  color: #a7f3d0; /* light green */
}

/* ✅ Preserve new lines from the AI response */
#messages .msg {
  white-space: pre-wrap;    /* keeps \n line breaks */
  word-break: break-word;  /* prevents overflow */
}

/* Optional: nicer spacing on long content */
#messages {
  scrollbar-width: thin;
}
  </style>
</head>

<body>
  <div id="chat-container">
    <div id="messages"></div>

    <div id="input-area">
      <input id="userInput" placeholder="Ask something…" />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

<script>
  async function sendMessage() {
    const input = document.getElementById("userInput");
    const messages = document.getElementById("messages");

    const userText = input.value.trim();
    if (!userText) return;

    // Show user message
    messages.innerHTML += `<div class="msg"><span class="user">You:</span> ${userText}</div>`;
    input.value = "";
    messages.scrollTop = messages.scrollHeight;

    try {
      const response = await fetch(
        "https://parseapi.back4app.com/functions/evastaAIChat",
        {
          method: "POST",
          headers: {
            "X-Parse-Application-Id": "gbW0BkveFDrQJxbgGLqka2HeITel0qsXob9iFwI8",
            "X-Parse-REST-API-Key": "bmR4ZTrDsW30Cy3lGj4QzKmt3QkBMm2C1OptnPuv",
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: userText })
        }
      );

      // If request failed, read text so you can debug
      if (!response.ok) {
        const errText = await response.text();
        console.error("Fetch failed:", response.status, errText);
        messages.innerHTML += `<div class="msg"><span class="bot">Evasta:</span> Request failed (${response.status}).</div>`;
        messages.scrollTop = messages.scrollHeight;
        return;
      }

      const data = await response.json();
      console.log("API response:", data);

      // ✅ Correct path from your logs
      const botText = data?.result?.reply ?? "No reply returned";

      // Render bot message
      messages.innerHTML += `<div class="msg"><span class="bot">Evasta:</span> ${botText}</div>`;
      messages.scrollTop = messages.scrollHeight;

    } catch (err) {
      console.error("sendMessage error:", err);
      messages.innerHTML += `<div class="msg"><span class="bot">Evasta:</span> Something went wrong. Check console.</div>`;
      messages.scrollTop = messages.scrollHeight;
    }
  }
</script>
</body>
</html>
